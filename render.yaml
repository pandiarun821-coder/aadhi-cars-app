services:
  - type: web
    name: aadhi-cars-app
    env: node
    buildCommand: "./render-build.sh"
    startCommand: "npm run start"
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_PATH
        value: /data/aadhi-cars.db
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
